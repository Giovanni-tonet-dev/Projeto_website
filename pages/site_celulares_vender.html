<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — TechCell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/home.css">
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="navbar__logo">
    <div class="navbar__logo-icon"><div class="celular"></div><div class="camera"></div></div>
    <h2 class="navbar__brand">TechCell</h2>
  </a>
  <div class="navbar__search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" placeholder="Buscar produtos…" aria-label="Campo de busca">
  </div>
  <div class="navbar__actions">
    <a href="favoritos.html" class="navbar__btn"><span>🤍</span><span class="btn-label">Favoritos</span></a>
    <a href="carrinho.html" class="navbar__btn">
      <span>🛒</span><span class="btn-label">Carrinho</span>
      <span class="badge badge-carrinho" style="display:none">0</span>
    </a>
    <a href="login.html" class="navbar__btn"><span>👤</span><span class="btn-label">Entrar</span></a>
  </div>
</nav>

<div class="page-content">
  <div class="container">

    <div class="section-header">
      <h2>📱 Todos os Produtos</h2>
      <div class="divider"></div>
    </div>

    <!-- Filtros -->
    <div class="filtros">
      <button class="filtro-btn ativo" data-filtro="todos">Todos</button>
      <button class="filtro-btn" data-filtro="smartphone">Smartphones</button>
      <button class="filtro-btn" data-filtro="tablet">Tablets</button>
      <button class="filtro-btn" data-filtro="acessorio">Acessórios</button>
    </div>

    <!-- Grade gerada via JS -->
    <div class="produtos-grid" id="produtos-lista"></div>

  </div>
</div>

<script src="../js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('produtos-lista');
  const params = new URLSearchParams(window.location.search);
  const filtroURL = params.get('filtro') || 'todos';

  // Marcar filtro ativo da URL
  if (filtroURL !== 'todos') {
    document.querySelectorAll('.filtro-btn').forEach(b => {
      b.classList.toggle('ativo', b.dataset.filtro === filtroURL);
    });
  }

  const todos = obterCatalogoProdutos();
  container.innerHTML = todos.map(p => criarCardHTML(p)).join('');
  atualizarBotoesVavorito();

  // Aplicar filtro URL
  if (filtroURL && filtroURL !== 'todos') {
    document.querySelectorAll('.produto-card[data-categoria]').forEach(card => {
      card.style.display = card.dataset.categoria === filtroURL ? '' : 'none';
    });
  }

  filtrarPorURL();
});
</script>
</body>
</html>
