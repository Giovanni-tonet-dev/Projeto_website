<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta</title>
  <link rel="stylesheet" href="../css/criarlogin.css">
</head>
<body>

  <div class="caixa">

    <h1>Criar conta</h1>
    <p>Preencha os campos abaixo para se cadastrar</p>

    <form id="registerForm">

      <label for="nome">Nome completo:</label>
      <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" placeholder="Digite seu e-mail">

      <label for="senha">Senha:</label>
      <input type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres">

      <label for="confirmar">Confirmar senha:</label>
      <input type="password" id="confirmar" name="confirmar" placeholder="Repita a senha">

      <div class="termos">
        <label>
          <input type="checkbox" id="termos">
          Concordo com os <a href="termosepolitica.html">Termos de uso</a> e a <a href="termosepolitica.html">Política de privacidade</a>
        </label>
      </div>

      <button type="submit">Criar conta</button>

    </form>

    <p>Já tem conta? <a href="login.html">Entrar</a></p>

  </div>

</body>
</html>
