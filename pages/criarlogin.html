<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta — TechCell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/criarlogin.css">
</head>
<body>

<main class="card">
  <a href="login.html" class="back-link">← Voltar ao login</a>

  <div class="card-header">
    <img src="../img/img_user.png" alt="TechCell" class="logo-img">
    <h1 class="title">Criar conta</h1>
    <p class="subtitle">Preencha os dados para se cadastrar</p>
  </div>

  <form id="criarForm" novalidate>

    <div class="field" id="field-nome">
      <label for="nome">Nome completo</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" autocomplete="name">
      </div>
      <span class="error-msg" id="error-nome"></span>
    </div>

    <div class="field" id="field-email">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
        </svg>
        <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <span class="error-msg" id="error-email"></span>
    </div>

    <div class="field" id="field-senha">
      <label for="senha">Senha</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="forca-wrap">
        <div class="forca-track"><div class="forca-bar" id="forca-bar"></div></div>
        <div class="forca-label" id="forca-text"></div>
      </div>
      <span class="error-msg" id="error-senha"></span>
    </div>

    <div class="field" id="field-confirmar">
      <label for="confirmar">Confirmar senha</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <input type="password" id="confirmar" name="confirmar" placeholder="Repita a senha">
      </div>
      <span class="error-msg" id="error-confirmar"></span>
    </div>

    <button type="submit" class="btn-primary">
      <span>Criar conta</span>
    </button>
  </form>

  <p class="footer-text">Já tem uma conta? <a href="login.html" class="link">Entrar</a></p>
</main>

<script src="../js/criarlogin.js"></script>
</body>
</html>
