<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPad Air— TechCell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/produtos.css">
</head>
 
<body>
 
  <!-- ── Navbar ── -->
  <nav class="navbar">
    <a href="../index.html" class="navbar__logo">
      <div class="navbar__logo-icon">
        <div class="celular"></div>
        <div class="camera"></div>
      </div>
      <h2 class="navbar__brand">TechCell</h2>
    </a>
 
    <div class="navbar__search">
      <span>🔍</span>
      <input type="text" placeholder="Faça uma busca" aria-label="Campo de busca">
    </div>
 
    <div class="navbar__actions">
      <a href="favoritos.html" class="navbar__btn">♡ Favoritos</a>
      <a href="carrinho.html" class="navbar__btn">🛒 Carrinho</a>
      <a href="login.html" class="navbar__btn">👤 Entrar</a>

  <div class="page-content">
    <div class="produto-container">
      <img src="../img/ipad_air.png" alt="Ipad Air" class="produto-imagem">
 
      <div class="produto-info">
        <h1>Ipad Air Chip M3</h1>
        <p class="produto-preco">R$ 6.799,00</p>
        <p>
          O mais avançado Ipad já criado, com câmera profissional,
          desempenho excepcional e bateria de longa duração.
        </p>
        <h3>Cores disponíveis</h3>

          <span class="cor preto" title="Preto"></span>
          <span class="cor vermelho" title="Vermelho"></span>
          <span class="cor azul" title="Azul"></span>
          <span class="cor laranja" title="Laranja"></span>

        <button class="btn-comprar">Comprar agora</button>

    </div>
