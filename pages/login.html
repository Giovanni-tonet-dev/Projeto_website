<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TechCell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<main class="card">
  <a href="../index.html" class="back-link">← Voltar à loja</a>

  <div class="card-header">
    <img src="../img/img_user.png" alt="TechCell" class="logo-img">
    <h1 class="title">Bem-vindo de volta</h1>
    <p class="subtitle">Entre com suas credenciais para continuar</p>
  </div>

  <form class="form" id="loginForm" novalidate>

    <div class="field" id="field-email">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
        </svg>
        <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <span class="error-msg" id="error-email"></span>
    </div>

    <div class="field" id="field-password">
      <label for="password">Senha</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
        <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar senha">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="error-msg" id="error-password"></span>
    </div>

    <div class="row-options">
      <label class="checkbox-label">
        <input type="checkbox" id="remember"> Lembrar de mim
      </label>
      <a href="#" class="link-forgot">Esqueci a senha</a>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">
      <span id="btnText">Entrar</span>
      <span class="spinner" id="spinner"></span>
    </button>
  </form>

  <p class="footer-text">Não tem uma conta? <a href="criarlogin.html" class="link">Criar conta</a></p>
</main>

<script src="../js/login.js"></script>
</body>
</html>
