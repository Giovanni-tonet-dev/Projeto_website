<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="carrinho.css">
    <title>Document</title>
</head>
<body>
   <div class="carrinho-container">

    <div class="carrinho-item">

        <img src="../img/produto1.png" alt="iPhone 17 Pro Max" class="produto-imagem">

        <div class="produto-info">
            <h3>iPhone 17 Pro Max 256GB</h3>

            <p>
                Tela Super Retina XDR 6.9",
                Câmera 48MP, Titânio Natural
            </p>

            <div class="acoes">
                <button>-</button>
                <span>1</span>
                <button>+</button>

                <button class="remover">
                    Remover
                </button>
            </div>
        </div>

        <div class="produto-preco">
            <span>R$ 7.499,90</span>
        </div>

    </div>

    <div class="carrinho-item">

        <img src="../img/s23-img.png" alt="Galaxy S23 Ultra" class="produto-imagem">

        <div class="produto-info">
            <h3>Samsung Galaxy S23 Ultra 256GB</h3>

            <p>
                Tela AMOLED 6.8",
                Câmera 200MP, 5G
            </p>

            <div class="acoes">
                <button>-</button>
                <span>1</span>
                <button>+</button>

                <button class="remover">
                    Remover
                </button>
            </div>
        </div>

        <div class="produto-preco">
            <span>R$ 7.999,90</span>
        </div>

    </div>

</div>
    
</body>
</html>
